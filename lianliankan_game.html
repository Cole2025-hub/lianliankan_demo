<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>连连看 - 经典消除游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .game-container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .game-title {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .info-panel {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
        }

        .info-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #48dbfb;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-hint {
            background: linear-gradient(135deg, #feca57, #ff9f43);
            color: #1a1a2e;
        }

        .btn-hint:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(254, 202, 87, 0.5);
        }

        .btn-hint:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-pause {
            background: linear-gradient(135deg, #48dbfb, #0abde3);
            color: #1a1a2e;
        }

        .btn-pause:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(72, 219, 251, 0.5);
        }

        .btn-restart {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: #fff;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.5);
        }

        .board-wrapper {
            position: relative;
            display: inline-block;
        }

        .game-board {
            display: inline-grid;
            gap: 4px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .cell {
            width: 55px;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            user-select: none;
        }

        .cell:hover:not(.empty):not(.selected) {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .cell.selected {
            background: rgba(254, 202, 87, 0.3);
            border-color: #feca57;
            box-shadow: 0 0 15px rgba(254, 202, 87, 0.5);
            transform: scale(1.05);
        }

        .cell.empty {
            background: rgba(255, 255, 255, 0.02);
            cursor: default;
            border: none;
        }

        .cell.hint {
            animation: hintPulse 1s ease infinite;
            border-color: #feca57;
        }

        @keyframes hintPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(254, 202, 87, 0.5); }
            50% { box-shadow: 0 0 20px rgba(254, 202, 87, 0.8), 0 0 40px rgba(254, 202, 87, 0.4); }
        }

        .cell.matching {
            animation: matchSuccess 0.4s ease forwards;
        }

        @keyframes matchSuccess {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        .cell.wrong {
            animation: wrongShake 0.4s ease;
            background: rgba(255, 107, 107, 0.3);
            border-color: #ff6b6b;
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #lineSvg {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10;
        }

        .connection-line {
            stroke: #feca57;
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 8px rgba(254, 202, 87, 0.9));
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 0.3s ease forwards;
        }

        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }

        .connection-line.fade-out {
            animation: fadeLine 0.2s ease forwards;
        }

        @keyframes fadeLine {
            to { opacity: 0; }
        }

        .pause-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .pause-overlay.active {
            display: flex;
        }

        .pause-content {
            text-align: center;
            color: #fff;
        }

        .pause-content h2 {
            font-size: 48px;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-resume {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #48dbfb, #0abde3);
            color: #1a1a2e;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-resume:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(72, 219, 251, 0.5);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(10px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        .modal h2 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .modal p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 25px;
        }

        .modal .btn {
            margin: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #48dbfb, #ff9ff3);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .timer-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .score-popup {
            position: fixed;
            font-size: 24px;
            font-weight: bold;
            color: #feca57;
            pointer-events: none;
            animation: floatUp 1s ease forwards;
            z-index: 50;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        .combo-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ff9ff3;
            text-shadow: 0 0 20px rgba(255, 159, 243, 0.5);
            pointer-events: none;
            animation: comboAppear 1s ease forwards;
            z-index: 50;
        }

        @keyframes comboAppear {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="game-container">
        <div class="game-header">
            <div class="game-title">连连看</div>
            <div class="info-panel">
                <div class="info-item">
                    <span class="info-label">关卡</span>
                    <span class="info-value" id="level">1</span>
                </div>
                <div class="info-item">
                    <span class="info-label">得分</span>
                    <span class="info-value" id="score">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">剩余</span>
                    <span class="info-value" id="remaining">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">提示</span>
                    <span class="info-value" id="hints">3</span>
                </div>
                <div class="info-item">
                    <span class="info-label">时间</span>
                    <span class="info-value" id="timer">00:00</span>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-hint" id="hintBtn" onclick="showHint()">提示 (3)</button>
                <button class="btn btn-pause" id="pauseBtn" onclick="pauseGame()">暂停</button>
                <button class="btn btn-restart" onclick="restartGame()">重开</button>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="timer-bar">
            <div class="timer-fill" id="timerFill" style="width: 100%"></div>
        </div>

        <div class="board-wrapper" id="boardWrapper">
            <div class="game-board" id="gameBoard"></div>
            <svg id="lineSvg"></svg>
        </div>
    </div>

    <div class="pause-overlay" id="pauseOverlay">
        <div class="pause-content">
            <h2>游戏暂停</h2>
            <button class="btn-resume" onclick="resumeGame()">继续游戏</button>
        </div>
    </div>

    <div class="modal-overlay" id="levelCompleteModal">
        <div class="modal">
            <h2 id="modalTitle">关卡完成!</h2>
            <p id="modalMessage">恭喜你通过了第1关</p>
            <p id="modalScore"></p>
            <button class="btn btn-pause" onclick="nextLevel()">下一关</button>
            <button class="btn btn-restart" onclick="restartLevel()">重新开始</button>
        </div>
    </div>

    <div class="modal-overlay" id="gameCompleteModal">
        <div class="modal">
            <h2>恭喜通关!</h2>
            <p id="finalScore">最终得分: 0</p>
            <button class="btn btn-pause" onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        const EMOJIS = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍒', '🍑', '🥝', '🍌', '🫐', 
                        '🥭', '🍍', '🥥', '🍉', '🍈', '🍐', '🥬', '🌽', '🥕', '🍄',
                        '🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯',
                        '🦁', '🐮', '🐷', '🐸', '🐵', '🐔', '🐧', '🐦', '🐤', '🦆',
                        '⚽', '🏀', '🏈', '⚾', '🎾', '🏐', '🎱', '🏓', '🏸', '🥊'];

        const LEVELS = [
            { rows: 4, cols: 6, pairs: 12, time: 120, emojiCount: 6 },
            { rows: 4, cols: 6, pairs: 12, time: 110, emojiCount: 6 },
            { rows: 5, cols: 6, pairs: 15, time: 120, emojiCount: 8 },
            { rows: 5, cols: 6, pairs: 15, time: 110, emojiCount: 8 },
            { rows: 5, cols: 8, pairs: 20, time: 130, emojiCount: 10 },
            { rows: 5, cols: 8, pairs: 20, time: 120, emojiCount: 10 },
            { rows: 6, cols: 8, pairs: 24, time: 140, emojiCount: 12 },
            { rows: 6, cols: 8, pairs: 24, time: 130, emojiCount: 12 },
            { rows: 6, cols: 10, pairs: 30, time: 150, emojiCount: 15 },
            { rows: 6, cols: 10, pairs: 30, time: 120, emojiCount: 15 }
        ];

        let currentLevel = 0;
        let board = [];
        let selected = null;
        let score = 0;
        let totalScore = 0;
        let hints = 3;
        let remaining = 0;
        let isPaused = false;
        let gameTimer = null;
        let timeLeft = 0;
        let combo = 0;
        let comboTimer = null;

        function init() {
            createStars();
            loadLevel(0);
        }

        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        function loadLevel(level) {
            currentLevel = level;
            const config = LEVELS[level];
            board = [];
            selected = null;
            hints = 3;
            combo = 0;
            timeLeft = config.time;
            isPaused = false;

            const totalEmojis = config.rows * config.cols;
            remaining = totalEmojis;

            const usedEmojis = EMOJIS.slice(0, config.emojiCount);
            const pairsNeeded = totalEmojis / 2;
            let emojis = [];
            for (let i = 0; i < pairsNeeded; i++) {
                const emoji = usedEmojis[i % usedEmojis.length];
                emojis.push(emoji, emoji);
            }
            emojis = shuffle(emojis);

            let idx = 0;
            for (let r = 0; r < config.rows; r++) {
                board[r] = [];
                for (let c = 0; c < config.cols; c++) {
                    board[r][c] = { emoji: emojis[idx], removed: false };
                    idx++;
                }
            }

            updateUI();
            renderBoard();
            startTimer();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function renderBoard() {
            const boardEl = document.getElementById('gameBoard');
            const config = LEVELS[currentLevel];
            boardEl.style.gridTemplateColumns = `repeat(${config.cols}, 55px)`;
            boardEl.innerHTML = '';

            const totalWidth = config.cols * 59 + 40;
            const totalHeight = config.rows * 59 + 40;
            const lineSvg = document.getElementById('lineSvg');
            lineSvg.setAttribute('width', totalWidth);
            lineSvg.setAttribute('height', totalHeight);
            lineSvg.innerHTML = '';

            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < config.cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (board[r][c].removed ? ' empty' : '');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    if (!board[r][c].removed) {
                        cell.textContent = board[r][c].emoji;
                        cell.onclick = () => cellClick(r, c);
                    }
                    boardEl.appendChild(cell);
                }
            }
        }

        function getCell(r, c) {
            return document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
        }

        function getCellCenter(r, c) {
            const config = LEVELS[currentLevel];
            const cellSize = 55;
            const gap = 4;
            const padding = 20;

            let col = c;
            let row = r;

            if (col < 0) {
                col = -1;
            } else if (col >= config.cols) {
                col = config.cols;
            }

            if (row < 0) {
                row = -1;
            } else if (row >= config.rows) {
                row = config.rows;
            }

            let x = padding + col * (cellSize + gap) + cellSize / 2;
            let y = padding + row * (cellSize + gap) + cellSize / 2;

            if (c >= config.cols) {
                x = padding + config.cols * (cellSize + gap) - gap + (c - config.cols + 1) * (cellSize + gap) - (cellSize + gap) + cellSize / 2;
                x = padding + config.cols * (cellSize + gap) + (c - config.cols) * (cellSize + gap) - gap + cellSize / 2 - (cellSize + gap) + cellSize / 2;
            }

            return { x, y };
        }

        function cellClick(r, c) {
            if (isPaused || board[r][c].removed) return;

            const cell = getCell(r, c);
            clearHints();

            if (!selected) {
                selected = { r, c };
                cell.classList.add('selected');
            } else if (selected.r === r && selected.c === c) {
                cell.classList.remove('selected');
                selected = null;
            } else {
                const prevCell = getCell(selected.r, selected.c);
                if (board[selected.r][selected.c].emoji === board[r][c].emoji && canConnect(selected.r, selected.c, r, c)) {
                    const path = findPath(selected.r, selected.c, r, c);
                    if (path) drawConnectionLine(path);

                    prevCell.classList.remove('selected');
                    prevCell.classList.add('matching');
                    cell.classList.add('matching');

                    setTimeout(() => {
                        board[selected.r][selected.c].removed = true;
                        board[r][c].removed = true;
                        remaining -= 2;

                        combo++;
                        const comboBonus = combo > 1 ? combo * 10 : 0;
                        const points = 100 + comboBonus;
                        score += points;
                        totalScore += points;

                        showScorePopup(cell, points);
                        if (combo > 1) showCombo(combo);

                        updateUI();
                        renderBoard();
                        selected = null;

                        if (remaining === 0) {
                            setTimeout(levelComplete, 300);
                        }
                    }, 400);
                } else {
                    prevCell.classList.remove('selected');
                    prevCell.classList.add('wrong');
                    cell.classList.add('wrong');
                    combo = 0;

                    setTimeout(() => {
                        prevCell.classList.remove('wrong');
                        cell.classList.remove('wrong');
                    }, 400);

                    selected = { r, c };
                    cell.classList.add('selected');
                }
            }
        }

        function canConnect(r1, c1, r2, c2) {
            const config = LEVELS[currentLevel];
            const rows = config.rows;
            const cols = config.cols;

            if (r1 === r2 && c1 === c2) return false;

            if (lineClear(r1, c1, r2, c2, rows, cols)) return true;

            for (let r = -1; r <= rows; r++) {
                if ((r === r1 || isEmpty(r, c1, rows, cols)) && (r === r2 || isEmpty(r, c2, rows, cols))) {
                    if (lineClear(r1, c1, r, c1, rows, cols) && lineClear(r, c1, r, c2, rows, cols) && lineClear(r, c2, r2, c2, rows, cols)) {
                        return true;
                    }
                }
            }

            for (let c = -1; c <= cols; c++) {
                if ((c === c1 || isEmpty(r1, c, rows, cols)) && (c === c2 || isEmpty(r2, c, rows, cols))) {
                    if (lineClear(r1, c1, r1, c, rows, cols) && lineClear(r1, c, r2, c, rows, cols) && lineClear(r2, c, r2, c2, rows, cols)) {
                        return true;
                    }
                }
            }

            for (let r = -1; r <= rows; r++) {
                for (let c = -1; c <= cols; c++) {
                    if (isEmpty(r, c, rows, cols)) {
                        if (lineClear(r1, c1, r, c, rows, cols) && lineClear(r, c, r2, c2, rows, cols)) {
                            return true;
                        }
                    }
                }
            }

            return false;
        }

        function isEmpty(r, c, rows, cols) {
            if (r < 0 || r >= rows || c < 0 || c >= cols) return true;
            return board[r][c].removed;
        }

        function lineClear(r1, c1, r2, c2, rows, cols) {
            if (r1 === r2) {
                const minC = Math.min(c1, c2);
                const maxC = Math.max(c1, c2);
                for (let c = minC + 1; c < maxC; c++) {
                    if (!isEmpty(r1, c, rows, cols)) return false;
                }
                return true;
            }
            if (c1 === c2) {
                const minR = Math.min(r1, r2);
                const maxR = Math.max(r1, r2);
                for (let r = minR + 1; r < maxR; r++) {
                    if (!isEmpty(r, c1, rows, cols)) return false;
                }
                return true;
            }
            return false;
        }

        function findPath(r1, c1, r2, c2) {
            const config = LEVELS[currentLevel];
            const rows = config.rows;
            const cols = config.cols;

            if (r1 === r2 && c1 === c2) return null;

            if (lineClear(r1, c1, r2, c2, rows, cols)) {
                return [{r: r1, c: c1}, {r: r2, c: c2}];
            }

            for (let r = -1; r <= rows; r++) {
                if ((r === r1 || isEmpty(r, c1, rows, cols)) && (r === r2 || isEmpty(r, c2, rows, cols))) {
                    if (lineClear(r1, c1, r, c1, rows, cols) && lineClear(r, c1, r, c2, rows, cols) && lineClear(r, c2, r2, c2, rows, cols)) {
                        let path = [{r: r1, c: c1}];
                        if (r !== r1) path.push({r: r, c: c1});
                        if (c1 !== c2) path.push({r: r, c: c2});
                        if (r !== r2) path.push({r: r2, c: c2});
                        return path;
                    }
                }
            }

            for (let c = -1; c <= cols; c++) {
                if ((c === c1 || isEmpty(r1, c, rows, cols)) && (c === c2 || isEmpty(r2, c, rows, cols))) {
                    if (lineClear(r1, c1, r1, c, rows, cols) && lineClear(r1, c, r2, c, rows, cols) && lineClear(r2, c, r2, c2, rows, cols)) {
                        let path = [{r: r1, c: c1}];
                        if (c !== c1) path.push({r: r1, c: c});
                        if (r1 !== r2) path.push({r: r2, c: c});
                        if (c !== c2) path.push({r: r2, c: c2});
                        return path;
                    }
                }
            }

            for (let r = -1; r <= rows; r++) {
                for (let c = -1; c <= cols; c++) {
                    if (isEmpty(r, c, rows, cols)) {
                        if (lineClear(r1, c1, r, c, rows, cols) && lineClear(r, c, r2, c2, rows, cols)) {
                            let path = [{r: r1, c: c1}, {r: r, c: c}];
                            if (r !== r2 || c !== c2) path.push({r: r2, c: c2});
                            return path;
                        }
                    }
                }
            }

            return null;
        }

        function drawConnectionLine(path) {
            const lineSvg = document.getElementById('lineSvg');
            lineSvg.innerHTML = '';

            const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
            const points = path.map(p => {
                const center = getCellCenter(p.r, p.c);
                return `${center.x},${center.y}`;
            }).join(' ');

            polyline.setAttribute('points', points);
            polyline.setAttribute('class', 'connection-line');

            const length = path.length * 200;
            polyline.style.strokeDasharray = length;
            polyline.style.strokeDashoffset = length;

            lineSvg.appendChild(polyline);

            setTimeout(() => {
                polyline.classList.add('fade-out');
                setTimeout(() => lineSvg.innerHTML = '', 200);
            }, 300);
        }

        function showHint() {
            if (hints <= 0 || isPaused) return;
            hints--;
            updateUI();

            for (let r1 = 0; r1 < LEVELS[currentLevel].rows; r1++) {
                for (let c1 = 0; c1 < LEVELS[currentLevel].cols; c1++) {
                    if (board[r1][c1].removed) continue;
                    for (let r2 = 0; r2 < LEVELS[currentLevel].rows; r2++) {
                        for (let c2 = 0; c2 < LEVELS[currentLevel].cols; c2++) {
                            if (r1 === r2 && c1 === c2) continue;
                            if (board[r2][c2].removed) continue;
                            if (board[r1][c1].emoji === board[r2][c2].emoji && canConnect(r1, c1, r2, c2)) {
                                const path = findPath(r1, c1, r2, c2);
                                if (path) drawConnectionLine(path);
                                const cell1 = getCell(r1, c1);
                                const cell2 = getCell(r2, c2);
                                cell1.classList.add('hint');
                                cell2.classList.add('hint');
                                setTimeout(clearHints, 3000);
                                return;
                            }
                        }
                    }
                }
            }
        }

        function clearHints() {
            document.querySelectorAll('.cell.hint').forEach(cell => cell.classList.remove('hint'));
        }

        function showScorePopup(cell, points) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = `+${points}`;
            const rect = cell.getBoundingClientRect();
            popup.style.left = rect.left + 'px';
            popup.style.top = rect.top + 'px';
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        function showCombo(count) {
            const comboEl = document.createElement('div');
            comboEl.className = 'combo-text';
            comboEl.textContent = `${count} 连击!`;
            document.body.appendChild(comboEl);
            setTimeout(() => comboEl.remove(), 1000);
        }

        function startTimer() {
            if (gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    updateTimerDisplay();
                    document.getElementById('timerFill').style.width = (timeLeft / LEVELS[currentLevel].time * 100) + '%';
                    if (timeLeft <= 0) {
                        clearInterval(gameTimer);
                        timeOut();
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const secs = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${mins}:${secs}`;
        }

        function timeOut() {
            showModal('时间到!', `第${currentLevel + 1}关超时了`, false);
        }

        function levelComplete() {
            clearInterval(gameTimer);
            const timeBonus = timeLeft * 10;
            score += timeBonus;
            totalScore += timeBonus;

            if (currentLevel >= 9) {
                document.getElementById('finalScore').textContent = `最终得分: ${totalScore}`;
                document.getElementById('gameCompleteModal').classList.add('active');
            } else {
                showModal('关卡完成!', `恭喜你通过了第${currentLevel + 1}关`, true, `时间奖励: +${timeBonus}`);
            }
        }

        function showModal(title, message, showNextBtn, extraMsg) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('modalScore').textContent = extraMsg || `当前得分: ${totalScore}`;
            document.querySelector('#levelCompleteModal .btn-pause').style.display = showNextBtn ? 'inline-block' : 'none';
            document.getElementById('levelCompleteModal').classList.add('active');
        }

        function nextLevel() {
            document.getElementById('levelCompleteModal').classList.remove('active');
            loadLevel(currentLevel + 1);
        }

        function restartLevel() {
            document.getElementById('levelCompleteModal').classList.remove('active');
            document.getElementById('gameCompleteModal').classList.remove('active');
            loadLevel(currentLevel);
        }

        function restartGame() {
            document.getElementById('levelCompleteModal').classList.remove('active');
            document.getElementById('gameCompleteModal').classList.remove('active');
            totalScore = 0;
            loadLevel(0);
        }

        function pauseGame() {
            if (isPaused) return;
            isPaused = true;
            document.getElementById('pauseOverlay').classList.add('active');
        }

        function resumeGame() {
            isPaused = false;
            document.getElementById('pauseOverlay').classList.remove('active');
        }

        function updateUI() {
            document.getElementById('level').textContent = currentLevel + 1;
            document.getElementById('score').textContent = score;
            document.getElementById('remaining').textContent = remaining;
            document.getElementById('hints').textContent = hints;
            document.getElementById('hintBtn').textContent = `提示 (${hints})`;
            document.getElementById('hintBtn').disabled = hints <= 0;

            const config = LEVELS[currentLevel];
            const totalCells = config.rows * config.cols;
            const progress = ((totalCells - remaining) / totalCells * 100);
            document.getElementById('progressFill').style.width = progress + '%';
        }

        init();
    </script>
</body>
</html>
